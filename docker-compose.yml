services:
  app:
    build:
      context: .
      target: development
    container_name: express_app
    restart: always
    ports:
      - "${PORT:-3000}:3000"
    volumes:
      - ./src:/app/src
      - ./package.json:/app/package.json
      - /app/node_modules
    env_file:
      - .env
    environment:
      - MONGO_URI=mongodb://mongodb:27017/express_starter
      - REDIS_URI=redis://redis:6379
    depends_on:
      - mongodb
      - redis

  mongodb:
    image: mongo:7.0
    container_name: express_mongodb
    restart: always
    ports:
      - "27017:27017"
    environment:
      MONGO_INITDB_DATABASE: express_starter
    volumes:
      - mongo_data:/data/db

  redis:
    image: redis:7-alpine
    container_name: express_redis
    restart: always
    ports:
      - "6379:6379"
    volumes:
      - redis_data:/data

volumes:
  mongo_data:
  redis_data:
